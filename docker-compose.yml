version: '3.8'

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: ff-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - ff-network

  db:
    image: mysql:8.0
    container_name: ff-mysql
    restart: always
    environment:
      MYSQL_DATABASE: feature_flags_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ff-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: ff-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ff-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: ff-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - ff-network

  grafana:
    image: grafana/grafana:latest
    container_name: ff-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - ff-network

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ff-network
  
  redis:
    image: redis:7-alpine
    container_name: ff-redis
    ports:
      - "6379:6379"
    networks:
      - ff-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ff-nestjs
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules      
    depends_on:
      - db
      - elasticsearch
      - redis
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root_password
      DB_DATABASE: feature_flags_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_NODE: http://elasticsearch:9200
    networks:
      - ff-network

networks:
  ff-network:
    driver: bridge

volumes:
  mysql_data:
  es_data:
  grafana_data: